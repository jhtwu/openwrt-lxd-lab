name: OpenWrt Lab CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 授予推送變更回 GitHub 倉庫的權限
permissions:
  contents: write

jobs:
  test-lab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 獲取完整提交紀錄以利推送
          fetch-depth: 0

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint Scripts
        run: |
          shellcheck -x -e SC1090 -e SC1091 scripts/*.sh

      - name: Setup LXD
        uses: canonical/setup-lxd@v1
        with:
          channel: latest/stable

      - name: Initialize Environment
        run: |
          sudo lxd waitready
          sudo make all

      - name: Update Live Log for Web
        if: always()
        run: |
          mkdir -p docs
          echo "=== Latest Execution Log (CI Generated) ===" > docs/latest_log.txt
          echo "Timestamp: $(date)" >> docs/latest_log.txt
          echo "------------------------------------------" >> docs/latest_log.txt
          
          if [ -f "logs/execution.log" ]; then
            sudo cat logs/execution.log >> docs/latest_log.txt
          else
            echo "Error: logs/execution.log not found." >> docs/latest_log.txt
          fi
          
          # 自動提交變更
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest_log.txt
          git commit -m "docs: auto-update live log [skip ci]" || echo "Nothing to commit"
          git push origin main
