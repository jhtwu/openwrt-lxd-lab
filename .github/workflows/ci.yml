name: OpenWrt Lab CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-lab:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint Scripts
        run: |
          shellcheck -x -e SC1090 -e SC1091 scripts/*.sh

      - name: Setup LXD
        uses: canonical/setup-lxd@v1
        with:
          channel: latest/stable

      - name: Initialize Environment
        run: |
          sudo lxd waitready
          sudo make all

      - name: Update Live Log for Web
        if: always()
        run: |
          mkdir -p docs
          # 加上時間戳記並複製日誌
          echo "=== Last CI Run: $(date) ===" > docs/latest_log.txt
          sudo cat logs/execution.log >> docs/latest_log.txt || echo "No logs available" >> docs/latest_log.txt
          
          # 自動提交變更
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest_log.txt
          git commit -m "docs: update latest execution log [skip ci]" || echo "No changes to commit"
          git push origin main
