# Network Settings
BRIDGE_WAN="br-wan"
BRIDGE_LAN="br-lan"

# Container Names
CTR_ROUTER="openwrt-router"
CTR_WAN_HOST="wan-host"
CTR_LAN_HOST="lan-host"

# Images
OPENWRT_VERSION="24.10"
HOST_IMAGE="images:alpine/3.20"

# Host Interface Names (for readability in brctl/ip link)
HIF_OWRT_WAN="v-owrt-wan"
HIF_OWRT_LAN="v-owrt-lan"
HIF_WAN_HOST="v-wan-host"
HIF_LAN_HOST="v-lan-host"

# Container Internal Interface Names (for lxc list readability)
CIF_WAN="wan"
CIF_LAN="lan"

# Network IP (for verification)
WAN_NET="10.0.0.0/24"
WAN_IP_ROUTER="10.0.0.1"
WAN_IP_HOST="10.0.0.2"

LAN_NET="192.168.1.0/24"
LAN_IP_ROUTER="192.168.1.1"
LAN_IP_HOST="192.168.1.10"
